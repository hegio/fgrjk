name: Sync Proxy Nodes

on:
  schedule:
    - cron: '0 */50 * * *'  # 每50小时同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install pyyaml

    - name: Download v2fgrjk from upstream
      run: |
        echo "Downloading v2fgrjk..."
        if curl -L --fail --max-time 30 -o "v2fgrjk.tmp" "https://ghfast.top/https://raw.githubusercontent.com/FGBLH/fgrjk/main/v2fgrjk"; then
          echo "Downloaded via ghfast.top"
        elif curl -L --fail --max-time 30 -o "v2fgrjk.tmp" "https://raw.githubusercontent.com/FGBLH/fgrjk/main/v2fgrjk"; then
          echo "Downloaded via direct"
        else
          echo "::error::Download failed"
          exit 1
        fi
        
        if [ -s "v2fgrjk.tmp" ]; then
          mv "v2fgrjk.tmp" "v2fgrjk"
          echo "Saved v2fgrjk ($(wc -c < v2fgrjk) bytes)"
        else
          echo "File is empty"
          exit 1
        fi

    - name: Decode and parse nodes
      run: |
        cat > parse_nodes.py << 'EOF'
        import base64
        import json
        import urllib.parse
        import re

        def safe_decode_base64(s):
            """安全解码 base64"""
            try:
                s = s.strip()
                # 补全 padding
                padding = 4 - len(s) % 4
                if padding != 4:
                    s += '=' * padding
                return base64.b64decode(s).decode('utf-8')
            except:
                return None

        def parse_vmess(link):
            """解析 vmess:// 为标准 Clash 格式"""
            try:
                if not link.startswith('vmess://'):
                    return None
                
                b64_data = link[8:]
                json_str = safe_decode_base64(b64_data)
                if not json_str:
                    return None
                
                data = json.loads(json_str)
                
                # 标准 Clash 字段映射
                node = {
                    'name': data.get('ps', data.get('remark', 'VMess Node')),
                    'type': 'vmess',
                    'server': data.get('add', ''),
                    'port': int(data.get('port', 443)),
                    'uuid': data.get('id', ''),
                    'alterId': int(data.get('aid', data.get('alterId', 0))),
                    'cipher': data.get('scy', 'auto'),
                    'tls': data.get('tls', '') == 'tls' or data.get('security', '') == 'tls',
                    'skip-cert-verify': True,
                    'servername': data.get('sni', ''),
                    'network': data.get('net', 'tcp'),
                }
                
                # WebSocket 配置 (参考你的示例格式)
                if node['network'] == 'ws':
                    node['ws-opts'] = {
                        'path': data.get('path', '/'),
                    }
                    if data.get('host'):
                        node['ws-opts']['headers'] = {
                            'Host': data['host']
                        }
                
                # 删除空值，保持整洁
                node = {k: v for k, v in node.items() if v not in ('', None)}
                if not node.get('servername'):
                    node.pop('servername', None)
                
                return node
            except Exception as e:
                print(f"Parse vmess error: {e}")
                return None

        def parse_vless(link):
            """解析 vless:// """
            try:
                if not link.startswith('vless://'):
                    return None
                
                # vless://uuid@server:port?params#name
                content = link[8:]
                
                # 分离 name
                if '#' in content:
                    content, name_b64 = content.split('#', 1)
                    name = urllib.parse.unquote(name_b64)
                else:
                    name = 'VLESS Node'
                
                # 分离参数
                if '?' in content:
                    base_part, params = content.split('?', 1)
                else:
                    base_part, params = content, ''
                
                # 解析 base: uuid@server:port
                if '@' not in base_part:
                    return None
                
                uuid, server_port = base_part.split('@', 1)
                
                if ':' not in server_port:
                    return None
                
                server, port_str = server_port.rsplit(':', 1)
                port = int(port_str)
                
                # 解析参数
                query = urllib.parse.parse_qs(params)
                
                node = {
                    'name': name,
                    'type': 'vless',
                    'server': server,
                    'port': port,
                    'uuid': uuid,
                    'tls': query.get('security', [''])[0] in ['tls', 'xtls', 'reality'],
                    'network': query.get('type', ['tcp'])[0],
                    'skip-cert-verify': True,
                }
                
                # flow 控制
                if 'flow' in query:
                    node['flow'] = query['flow'][0]
                
                # WS 配置
                if node['network'] == 'ws':
                    node['ws-opts'] = {
                        'path': query.get('path', ['/'])[0],
                    }
                    if 'host' in query:
                        node['ws-opts']['headers'] = {
                            'Host': query['host'][0]
                        }
                
                # Reality 配置
                if query.get('security', [''])[0] == 'reality':
                    node['reality-opts'] = {
                        'public-key': query.get('pbk', [''])[0],
                        'short-id': query.get('sid', [''])[0],
                    }
                
                # 删除空值
                node = {k: v for k, v in node.items() if v not in ('', None, False)}
                if not node.get('tls'):
                    node.pop('tls', None)
                
                return node
            except Exception as e:
                print(f"Parse vless error: {e}")
                return None

        def parse_trojan(link):
            """解析 trojan:// """
            try:
                if not link.startswith('trojan://'):
                    return None
                
                content = link[9:]
                
                # 分离 name
                if '#' in content:
                    content, name_encoded = content.split('#', 1)
                    name = urllib.parse.unquote(name_encoded)
                else:
                    name = 'Trojan Node'
                
                # 分离参数
                if '?' in content:
                    base_part, params = content.split('?', 1)
                else:
                    base_part, params = content, ''
                
                # 解析 password@server:port
                if '@' not in base_part:
                    return None
                
                password, server_port = base_part.split('@', 1)
                
                if ':' not in server_port:
                    return None
                
                server, port_str = server_port.rsplit(':', 1)
                port = int(port_str)
                
                query = urllib.parse.parse_qs(params)
                
                node = {
                    'name': name,
                    'type': 'trojan',
                    'server': server,
                    'port': port,
                    'password': password,
                    'skip-cert-verify': True,
                }
                
                # sni
                if 'sni' in query:
                    node['sni'] = query['sni'][0]
                
                # ws
                if query.get('type', [''])[0] == 'ws':
                    node['network'] = 'ws'
                    node['ws-opts'] = {
                        'path': query.get('path', ['/'])[0],
                    }
                
                return node
            except Exception as e:
                print(f"Parse trojan error: {e}")
                return None

        def parse_ss(link):
            """解析 ss:// """
            try:
                if not link.startswith('ss://'):
                    return None
                
                content = link[5:]
                
                # 分离 name
                if '#' in content:
                    content, name_encoded = content.split('#', 1)
                    name = urllib.parse.unquote(name_encoded)
                else:
                    name = 'SS Node'
                
                # 处理 base64 编码部分
                if '@' in content and not content.startswith('Ym'):
                    # 明文格式: method:pass@server:port
                    method_pass, server_port = content.split('@', 1)
                    method, password = method_pass.split(':', 1)
                else:
                    # base64 格式
                    if '@' in content:
                        b64_part, server_port = content.split('@', 1)
                    else:
                        b64_part = content
                        server_port = ''
                    
                    decoded = safe_decode_base64(b64_part)
                    if not decoded or ':' not in decoded:
                        return None
                    method, password = decoded.split(':', 1)
                
                if not server_port or ':' not in server_port:
                    return None
                
                server, port_str = server_port.rsplit(':', 1)
                port = int(port_str)
                
                node = {
                    'name': name,
                    'type': 'ss',
                    'server': server,
                    'port': port,
                    'cipher': method,
                    'password': password,
                }
                
                return node
            except Exception as e:
                print(f"Parse ss error: {e}")
                return None

        # 读取 v2fgrjk 文件
        with open('v2fgrjk', 'r', encoding='utf-8') as f:
            content = f.read().strip()

        # 尝试 base64 解码（订阅格式通常是 base64）
        decoded = safe_decode_base64(content)
        if decoded:
            lines = [l.strip() for l in decoded.split('\n') if l.strip()]
            print(f"Decoded base64 subscription: {len(lines)} lines")
        else:
            lines = [l.strip() for l in content.split('\n') if l.strip()]
            print(f"Plain text mode: {len(lines)} lines")

        proxies = []
        errors = []

        for line in lines:
            if not line:
                continue
            
            node = None
            if line.startswith('vmess://'):
                node = parse_vmess(line)
            elif line.startswith('vless://'):
                node = parse_vless(line)
            elif line.startswith('trojan://'):
                node = parse_trojan(line)
            elif line.startswith('ss://'):
                node = parse_ss(line)
            
            if node:
                proxies.append(node)
            else:
                errors.append(line[:50])

        print(f"✓ Successfully parsed: {len(proxies)} nodes")
        if errors:
            print(f"✗ Failed to parse: {len(errors)} lines")

        # 保存解析结果供后续使用
        import json
        with open('parsed_nodes.json', 'w') as f:
            json.dump(proxies, f, indent=2)
        
        print("Saved parsed_nodes.json")
        EOF
        
        python3 parse_nodes.py

    - name: Generate Clash config (修正版)
      run: |
        cat > generate_clash.py << 'EOF'
        import yaml
        import json

        # 读取解析后的节点
        with open('parsed_nodes.json', 'r') as f:
            proxies = json.load(f)

        if not proxies:
            print("No valid proxies found!")
            exit(1)

        # 生成 proxy-groups（参考你的示例格式）
        proxy_names = [p['name'] for p in proxies]
        
        proxy_groups = [
            {
                'name': 'Auto',
                'type': 'select',
                'proxies': proxy_names[:50]  # 限制数量避免卡顿
            },
            {
                'name': 'LoadBalance',
                'type': 'load-balance',
                'strategy': 'consistent-hashing',
                'proxies': proxy_names,
                'url': 'http://www.gstatic.com/generate_204',
                'interval': 300
            }
        ]

        # 基础 rules（简化版，可根据需要扩展）
        rules = [
            'DOMAIN-SUFFIX,google.com,Auto',
            'DOMAIN-SUFFIX,youtube.com,Auto',
            'DOMAIN-KEYWORD,google,Auto',
            'MATCH,DIRECT'
        ]

        # 构建完整配置（严格遵循参考格式）
        config = {
            'mixed-port': 7890,
            'allow-lan': True,
            'bind-address': '*',
            'mode': 'rule',
            'log-level': 'info',
            'external-controller': '127.0.0.1:9090',
            'dns': {
                'enable': True,
                'nameserver': ['114.114.114.114', '8.8.8.8']
            },
            'proxies': proxies,
            'proxy-groups': proxy_groups,
            'rules': rules
        }

        # 写入 YAML（使用标准格式，不转义 Unicode）
        with open('nodes_clash.yaml', 'w', encoding='utf-8') as f:
            yaml.dump(config, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

        print(f"Generated nodes_clash.yaml with {len(proxies)} proxies")
        
        # 同时生成 config.yaml（供 Clash Verge 等使用）
        with open('config.yaml', 'w', encoding='utf-8') as f:
            yaml.dump(config, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
        
        print("Generated config.yaml")
        EOF
        
        python3 generate_clash.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 只添加新文件和更新的文件，保留旧文件
        git add v2fgrjk parsed_nodes.json nodes_clash.yaml config.yaml
        
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "🔄 Update v2fgrjk and generate Clash config [$(date '+%Y-%m-%d %H:%M')]"
          git push
          echo "✅ Done"
        fi

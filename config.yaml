mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
dns:
  enable: true
  nameserver:
  - 114.114.114.114
  - 8.8.8.8
proxies:
- name: 🇭🇰香港
  type: vmess
  server: gtm1.ktmwan.net
  port: 12890
  uuid: ff54668a-faf7-405c-a8be-77935348851a
  alterId: 0
  cipher: auto
  tls: false
  skip-cert-verify: true
  network: ws
  ws-opts:
    path: /
    headers:
      Host: baidu.com
- name: 🇻🇳 越南
  type: vmess
  server: gtm1.ktmwan.net
  port: 12891
  uuid: ff54668a-faf7-405c-a8be-77935348851a
  alterId: 0
  cipher: auto
  tls: false
  skip-cert-verify: true
  network: ws
  ws-opts:
    path: /
    headers:
      Host: baidu.com
- name: 🇮🇳 印度
  type: vmess
  server: gtm1.ktmwan.net
  port: 12887
  uuid: ff54668a-faf7-405c-a8be-77935348851a
  alterId: 0
  cipher: auto
  tls: false
  skip-cert-verify: true
  network: ws
  ws-opts:
    path: /
    headers:
      Host: baidu.com
- name: 🇦🇺 澳大利亚
  type: vmess
  server: gtm1.ktmwan.net
  port: 12889
  uuid: ff54668a-faf7-405c-a8be-77935348851a
  alterId: 0
  cipher: auto
  tls: false
  skip-cert-verify: true
  network: ws
  ws-opts:
    path: /
    headers:
      Host: baidu.com
proxy-groups:
- name: Auto
  type: select
  proxies:
  - 🇭🇰香港
  - 🇻🇳 越南
  - 🇮🇳 印度
  - 🇦🇺 澳大利亚
- name: LoadBalance
  type: load-balance
  strategy: consistent-hashing
  proxies:
  - 🇭🇰香港
  - 🇻🇳 越南
  - 🇮🇳 印度
  - 🇦🇺 澳大利亚
  url: http://www.gstatic.com/generate_204
  interval: 300
rules:
- DOMAIN-SUFFIX,google.com,Auto
- DOMAIN-SUFFIX,youtube.com,Auto
- DOMAIN-KEYWORD,google,Auto
- MATCH,DIRECT

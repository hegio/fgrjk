allow-lan: true
dns:
  enable: true
  nameserver:
  - 114.114.114.114
  - 8.8.8.8
external-controller: 0.0.0.0:9090
log-level: info
mixed-port: 7890
mode: rule
proxies: []
proxy-groups:
- name: Auto
  proxies: []
  type: select
- interval: 300
  name: LoadBalance
  proxies: []
  strategy: consistent-hashing
  type: load-balance
  url: http://www.gstatic.com/generate_204
rules:
- DOMAIN-SUFFIX,google.com,Auto
- DOMAIN-SUFFIX,youtube.com,Auto
- DOMAIN-KEYWORD,google,Auto
- MATCH,DIRECT
